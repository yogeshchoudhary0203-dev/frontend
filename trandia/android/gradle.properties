org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=512m -Djava.net.preferIPv4Stack=true
android.useAndroidX=true
android.enableJetifier=true
# Suppress "source/target value 8 obsolete" notes from SDK tools
android.suppressUnsupportedCompileSdk=34
# FIX: Kotlin incremental compiler crashes when pub cache (C:\) and project (D:\) are on different drives
kotlin.incremental=false
org.gradle.daemon=false
# R8 full mode: more aggressive dead-code elimination than compat mode.
# Saves an additional 3-8 MB by removing code that compat mode leaves behind.
# Safe as long as keep rules in proguard-rules.pro cover all reflection paths.
android.enableR8.fullMode=true
